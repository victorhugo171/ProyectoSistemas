{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Eliminación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        .confirm-card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 12px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.08); 
            text-align: center; 
            max-width: 450px; 
            width: 100%;
        }
        .warning-icon { 
            font-size: 60px; 
            color: #dc3545; 
            margin-bottom: 20px; 
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .confirm-card h2 {
            font-weight: 700;
            color: #212529;
            margin-bottom: 15px;
        }
        .product-name {
            font-size: 1.25rem;
            color: #dc3545;
            padding: 15px;
            background: #fff5f5;
            border-radius: 8px;
            display: inline-block;
            margin: 10px 0 20px 0;
            border: 1px dashed #dc3545;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="confirm-card">
    <div class="warning-icon"><i class="fas fa-exclamation-triangle"></i></div>
    <h2>¿Eliminar Registro?</h2>
    <p class="text-muted mb-2">Estás a punto de borrar permanentemente el registro de:</p>
    
    <div class="product-name">
        <strong>{{ object.marca }} {{ object.modelo }}</strong>
    </div>
    
    <p class="text-secondary small mb-4">Esta acción no se puede deshacer y los datos se perderán de la base de datos.</p>

    <form method="post" class="d-flex justify-content-center gap-2">
        {% csrf_token %}
        <a href="{% url 'lista_celulares' %}" class="btn btn-light border fw-medium px-4">Cancelar</a>
        <button type="submit" class="btn btn-danger fw-medium px-4"><i class="fas fa-trash-alt me-1"></i> Sí, eliminar</button>
    </form>
</div>

</body>
</html>
